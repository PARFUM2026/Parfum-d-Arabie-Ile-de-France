<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Luxury Perfume E-Commerce</title>\n    <style>\n        body {\n            margin: 0;\n            font-family: Arial, sans-serif;\n            background-color: #000;\n            color: gold;\n        }\n        .navbar {\n            background-color: #000;\n            padding: 15px;\n            display: flex;\n            justify-content: space-between;\n        }\n        .navbar a {\n            color: gold;\n            text-decoration: none;\n            margin: 0 15px;\n        }\n        .hero {\n            text-align: center;\n            padding: 60px 0;\n            background: url('hero-image.jpg') no-repeat center center;\n            background-size: cover;\n            color: white;\n        }\n        .products {\n            display: flex;\n            flex-wrap: wrap;\n            justify-content: center;\n            padding: 20px;\n        }\n        .product-card {\n            background-color: #222;\n            border: 1px solid gold;\n            border-radius: 8px;\n            margin: 10px;\n            width: 200px;\n            text-align: center;\n        }\n        .product-card img {\n            width: 100%;\n            border-bottom: 1px solid gold;\n        }\n        .cart-icon {\n            position: absolute;\n            top: 15px;\n            right: 15px;\n            color: gold;\n        }\n    </style>\n</head>\n<body>\n    <div class="navbar">\n        <div><a href="#">Home</a><a href="#">Products</a><a href="#">Contact</a></div>\n        <div class="cart-icon">🛒</div>\n    </div>\n    <div class="hero">\n        <h1>Discover Your Signature Fragrance</h1>\n        <p>Explore our luxury collection of perfumes</p>\n    </div>\n    <div class="products">\n        <!-- Product cards will be generated dynamically -->\n        <script>\n            const products = []; // Populate this array with product data\n            for (let i = 1; i <= 30; i++) {\n                products.push({\n                    name: `Perfume ${i}`,\n                    image: `perfume${i}.jpg`,\n                    price: (Math.random() * 100 + 50).toFixed(2)\n                });\n            }\n            const productsDiv = document.querySelector('.products');\n            products.forEach(product => {\n                const productCard = document.createElement('div');\n                productCard.className = 'product-card';\n                productCard.innerHTML = `\n                    <img src="${product.image}" alt="${product.name}">\n                    <h3>${product.name}</h3>\n                    <p>$${product.price}</p>\n                `;\n                productsDiv.appendChild(productCard);\n            });\n        </script>\n    </div>\n</body>\n</html>
